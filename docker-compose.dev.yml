# docker-compose.dev.yml — Geliştirme ortamı
# Kullanım: docker compose -f docker-compose.dev.yml up --build

services:
  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: isk-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: katmanisimsehir
      POSTGRES_USER: ${DB_USER:-iskuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iskpass123}
    volumes:
      - isk_pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iskuser} -d katmanisimsehir"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js App (development mode)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: isk-dev-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./server:/usr/src/app/server
      - ./client:/usr/src/app/client
      - ./admin:/usr/src/app/admin
      - ./tailwind.config.js:/usr/src/app/tailwind.config.js
      - ./logs:/usr/src/app/logs
    ports:
      - "3007:3000"

volumes:
  isk_pgdata_dev:
