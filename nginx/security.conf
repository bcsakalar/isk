# ============================================================
# Güvenlik Headerları — Katman İsim Şehir
# ============================================================

# XSS Protection (eski tarayıcılar için)
add_header X-XSS-Protection "1; mode=block" always;

# Content Type Sniffing
add_header X-Content-Type-Options "nosniff" always;

# Frame Options (clickjacking)
add_header X-Frame-Options "DENY" always;

# Referrer Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()" always;

# Cross-Origin headers
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Cross-Domain Policies
add_header X-Permitted-Cross-Domain-Policies "none" always;

# Download Options (IE)
add_header X-Download-Options "noopen" always;

# DNS Prefetch Control
add_header X-DNS-Prefetch-Control "off" always;

# CSP (Express helmet ile senkronize — unsafe-inline kaldırıldı)
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss: ws:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

# Hide server version
server_tokens off;
