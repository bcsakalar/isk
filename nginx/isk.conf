# ============================================================
# VPS Nginx Site Config — Katman İsim Şehir
# ============================================================
# Bu dosyayı VPS'e kopyalayın:
#   sudo cp isk.conf /etc/nginx/sites-available/isk.conf
#   sudo ln -s /etc/nginx/sites-available/isk.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL için:
#   sudo certbot --nginx -d isimsehir.example.com
# ============================================================

# Rate limit tanımlamaları (http context — /etc/nginx/conf.d/rate-limit.conf olarak ayrı dosyaya koyun)
# limit_req_zone $binary_remote_addr zone=isk_api:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=isk_auth:10m rate=5r/s;
# limit_conn_zone $binary_remote_addr zone=isk_conn:10m;

upstream isk_backend {
    server 127.0.0.1:3006;
    keepalive 32;
}

# ─── HTTP → HTTPS Redirect ────────────────────────────────────
server {
    listen 80;
    server_name isimsehir.example.com;

    # Certbot challenge desteği
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tüm HTTP trafiğini HTTPS'e yönlendir
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ─── HTTPS Server ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name isimsehir.example.com;

    # ─── SSL Sertifikaları (certbot otomatik ekler) ───────────
    # ssl_certificate /etc/letsencrypt/live/isimsehir.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/isimsehir.example.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── SSL Hardening ────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ─── Güvenlik Headerları ──────────────────────────────────
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Download-Options "noopen" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss: ws:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    # ─── Sunucu Gizleme ──────────────────────────────────────
    server_tokens off;

    # ─── Bağlantı Limitleri ───────────────────────────────────
    # limit_conn isk_conn 20;

    # ─── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ─── Socket.IO ────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://isk_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ─── API Auth (sıkı rate limit) ──────────────────────────
    location /api/auth/ {
        proxy_pass http://isk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
        proxy_connect_timeout 10;
        # limit_req zone=isk_auth burst=10 nodelay;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ─── API Genel ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://isk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
        proxy_connect_timeout 10;
        # limit_req zone=isk_api burst=20 nodelay;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ─── Admin Panel (ek güvenlik) ────────────────────────────
    location /admin {
        proxy_pass http://isk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store" always;
    }

    # ─── Static Files & SPA Fallback ─────────────────────────
    location / {
        proxy_pass http://isk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Gizli dosyalara erişim engelle ──────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Genel Ayarlar ───────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    access_log /var/log/nginx/isk_access.log;
    error_log /var/log/nginx/isk_error.log;
}
