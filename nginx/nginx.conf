upstream nodejs {
    server app:3000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=static_zone:10m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

server {
    listen 80;
    server_name _;

    # Security headers
    include /etc/nginx/security.conf;

    # Bağlantı limitleri
    limit_conn conn_zone 20;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static dosyalar
    location /css/ {
        alias /var/www/client/css/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        limit_req zone=static_zone burst=30 nodelay;
    }

    location /js/ {
        alias /var/www/client/js/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        limit_req zone=static_zone burst=30 nodelay;
    }

    # Favicon & manifest & robots & sitemap
    location = /favicon.ico { alias /var/www/client/favicon.ico; expires 30d; access_log off; }
    location = /robots.txt { alias /var/www/client/robots.txt; expires 1d; access_log off; }
    location = /sitemap.xml { alias /var/www/client/sitemap.xml; expires 1d; access_log off; }
    location = /manifest.json { alias /var/www/client/manifest.json; expires 7d; access_log off; }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://nodejs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # API — Auth endpointleri (sıkı limit)
    location /api/auth/ {
        proxy_pass http://nodejs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
        proxy_connect_timeout 10;
        limit_req zone=auth_zone burst=10 nodelay;

        # API cevapları cache'lenmemeli
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # API — Genel
    location /api/ {
        proxy_pass http://nodejs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
        proxy_connect_timeout 10;
        limit_req zone=api_zone burst=20 nodelay;

        # API cevapları cache'lenmemeli
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Admin panel — ek güvenlik
    location /admin {
        alias /var/www/admin/;
        try_files $uri $uri/ /admin/index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header X-Frame-Options "DENY" always;
        add_header Cache-Control "no-store" always;
        limit_req zone=api_zone burst=10 nodelay;
    }

    # SPA fallback
    location / {
        root /var/www/client;
        try_files $uri $uri/ /index.html;
    }

    # Dosya boyutu limiti
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Gizli dosyalara erişim engelle
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Loglar
    access_log /var/log/nginx/isk_access.log;
    error_log /var/log/nginx/isk_error.log;
}
