# docker-compose.prod.yml — Production (VPS) ortamı
# Kullanım: docker compose -f docker-compose.prod.yml up -d --build

services:
  # PostgreSQL — dışarıya port açılmaz
  db:
    image: postgres:16-alpine
    container_name: isk-prod-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: katmanisimsehir
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - isk_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d katmanisimsehir"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'

  # Node.js App (production mode)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: isk-prod-app
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./logs:/usr/src/app/logs
    ports:
      - "127.0.0.1:3006:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.00'

volumes:
  isk_pgdata_prod:
