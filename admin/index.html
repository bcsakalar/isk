<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>İSK Admin Panel</title>
  <link rel="stylesheet" href="/css/output.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet" />
</head>
<body class="bg-retro-bg text-retro-text min-h-screen">
  <div id="admin-app" class="flex min-h-screen">
    <!-- Mobile Header -->
    <div class="fixed top-0 left-0 right-0 bg-retro-surface border-b-2 border-retro-accent/30 p-3 flex items-center justify-between md:hidden z-40">
      <h1 class="font-pixel text-retro-accent text-xs">İSK ADMIN</h1>
      <button id="admin-hamburger" class="flex flex-col gap-1 p-1">
        <span class="block w-5 h-0.5 bg-retro-text"></span>
        <span class="block w-5 h-0.5 bg-retro-text"></span>
        <span class="block w-5 h-0.5 bg-retro-text"></span>
      </button>
    </div>
    <!-- Mobile overlay -->
    <div id="admin-overlay" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden"></div>

    <!-- Sidebar -->
    <aside id="admin-sidebar" class="fixed top-0 left-0 h-full w-64 bg-retro-surface border-r-2 border-retro-accent/30 p-4 space-y-4 z-50 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 md:block">
      <div class="flex items-center justify-between py-4 border-b border-retro-accent/20 md:justify-center">
        <h1 class="font-pixel text-retro-accent text-xs">İSK ADMIN</h1>
        <button id="admin-sidebar-close" class="font-vt323 text-2xl text-retro-text/50 hover:text-retro-accent md:hidden">&times;</button>
      </div>
      <nav class="space-y-2">
        <a href="/admin/dashboard" class="block px-3 py-2 rounded font-vt323 text-lg hover:bg-retro-accent/10 transition-colors" data-nav="dashboard">📊 Dashboard</a>
        <a href="/admin/users" class="block px-3 py-2 rounded font-vt323 text-lg hover:bg-retro-accent/10 transition-colors" data-nav="users">👥 Kullanıcılar</a>
        <a href="/admin/rooms" class="block px-3 py-2 rounded font-vt323 text-lg hover:bg-retro-accent/10 transition-colors" data-nav="rooms">🏠 Odalar</a>
        <a href="/admin/announcements" class="block px-3 py-2 rounded font-vt323 text-lg hover:bg-retro-accent/10 transition-colors" data-nav="announce">📢 Duyurular</a>
        <a href="/admin/logs" class="block px-3 py-2 rounded font-vt323 text-lg hover:bg-retro-accent/10 transition-colors" data-nav="logs">📋 Loglar</a>
        <a href="/admin/reports" class="block px-3 py-2 rounded font-vt323 text-lg hover:bg-retro-accent/10 transition-colors" data-nav="reports">🚨 Raporlar</a>
        <a href="/admin/contact" class="block px-3 py-2 rounded font-vt323 text-lg hover:bg-retro-accent/10 transition-colors" data-nav="contact">✉️ İletişim</a>
      </nav>
      <div class="pt-4 border-t border-retro-accent/20">
        <a href="/" class="font-vt323 text-sm text-retro-text/50 hover:text-retro-accent">← Ana Siteye Dön</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-3 pt-14 overflow-auto md:p-6 md:pt-6">
      <div id="admin-content">
        <p class="font-vt323 text-retro-text/40 text-center py-20">Yükleniyor...</p>
      </div>
    </main>
  </div>

  <script src="/js/utils/store.js"></script>
  <script src="/js/utils/api.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/admin/js/admin-app.js"></script>
</body>
</html>
